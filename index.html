<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN-X OMNI v80</title>
    
    <style>
        :root {
            --gold: #d4af37; --bg: #030303; --panel: #0a0a0c;
            --border: #1a1a1c; --neon: #00ff41; --danger: #ff003c;
            --blue: #00d2ff; --gpt: #74aa9c;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: #fff; font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        /* نظام الواجهة */
        #os-container { display: flex; flex-direction: column; height: 100%; position: relative; }

        header {
            height: 35px; background: #000; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; padding: 0 15px;
            font-size: 0.6rem; color: var(--gold); text-transform: uppercase;
        }

        /* النوافذ العائمة */
        .win {
            position: absolute; width: 96%; height: 78%; top: 45px; left: 2%;
            background: rgba(8, 8, 10, 0.98); border: 1px solid var(--border);
            border-radius: 8px; display: none; flex-direction: column;
            box-shadow: 0 15px 50px #000; backdrop-filter: blur(15px); z-index: 10;
        }
        .win.active { display: flex; z-index: 100; border-color: var(--gold); }

        .win-head {
            background: #111; padding: 10px 15px; display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        .win-title { font-size: 0.65rem; font-weight: bold; color: var(--gold); }
        .win-close { color: var(--danger); font-size: 1.2rem; cursor: pointer; }

        .win-body { flex: 1; overflow-y: auto; padding: 12px; font-size: 0.8rem; }
        .win-body::-webkit-scrollbar { display: none; }

        /* الشات المتطور */
        .chat-feed { display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px; border-radius: 5px; max-width: 90%; line-height: 1.4; position: relative; }
        .bubble.sys { background: #0d0d0f; border-right: 3px solid var(--gold); color: #ccc; }
        .bubble.usr { background: #151518; border-left: 3px solid var(--blue); align-self: flex-end; }
        .bubble b { font-size: 0.55rem; color: var(--gold); display: block; margin-bottom: 3px; }

        /* منطقة الأوامر */
        .dock-input {
            background: #000; padding: 10px; border-top: 1px solid var(--border);
            display: flex; gap: 8px; align-items: center;
        }
        .dock-input input { flex: 1; background: #080808; border: 1px solid #222; color: #fff; padding: 10px; border-radius: 4px; font-size: 0.75rem; }
        .btn-send { background: var(--gold); border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* الترسانة */
        .grid-tools { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card-tool { background: #0c0c0e; border: 1px solid #1a1a1c; padding: 15px; border-radius: 6px; text-align: center; }
        .card-tool:active { border-color: var(--neon); }

        /* شريط التنقل السفلي */
        nav {
            height: 60px; background: #000; border-top: 1px solid #111;
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-btn { color: #444; font-size: 0.6rem; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
        .nav-btn.active { color: var(--gold); }

        #sys-log { height: 20px; background: #000; color: var(--neon); font-size: 0.5rem; padding: 2px 15px; border-top: 1px solid #080808; }

    </style>
</head>
<body>

<div id="os-container">
    <header>
        <span>TITAN_OMNI_v80</span>
        <span id="ping">LATENCY: --ms</span>
        <span id="clock">00:00:00</span>
    </header>

    <div id="workspace" style="flex:1; position:relative;">
        
        <div id="win-core" class="win active">
            <div class="win-head"><span class="win-title">NEURAL_COMMAND_CENTER</span><span class="win-close" onclick="cls('win-core')">_</span></div>
            <div class="win-body" id="main-log-area">
                <div class="chat-feed" id="chat-stream">
                    <div class="bubble sys"><b>[TITAN_X]</b> النظام يعمل بتقنية Proxy Tunnel. أدخل مفاتيحك في CONFIG للبدء الفوري.</div>
                </div>
            </div>
            <div class="dock-input">
                <select id="engine" style="background:#000; color:var(--gold); border:1px solid #333; font-size:0.6rem; border-radius:3px; height:35px;">
                    <option value="gemini">GEMINI</option>
                    <option value="gpt">GPT-4</option>
                </select>
                <input type="text" id="cmd-in" placeholder="أدخل أمراً عملياتياً..." onkeypress="if(event.key==='Enter') execute()">
                <button class="btn-send" onclick="execute()">EXE</button>
            </div>
        </div>

        <div id="win-arsenal" class="win">
            <div class="win-head"><span class="win-title">WEAPONRY_ARSENAL</span><span class="win-close" onclick="cls('win-arsenal')">_</span></div>
            <div class="win-body">
                <div class="grid-tools" id="arsenal-grid"></div>
            </div>
        </div>

        <div id="win-config" class="win">
            <div class="win-head"><span class="win-title">SYSTEM_CONFIG</span><span class="win-close" onclick="cls('win-config')">_</span></div>
            <div class="win-body">
                <div style="margin-bottom:15px;">
                    <label style="font-size:0.6rem; color:var(--gold);">GEMINI_API_KEY:</label>
                    <input type="password" id="key-gem" style="width:100%; background:#000; border:1px solid #222; color:var(--neon); padding:10px; margin-top:5px;" placeholder="AIza...">
                </div>
                <div style="margin-bottom:15px;">
                    <label style="font-size:0.6rem; color:var(--gpt);">OPENAI_GPT_KEY:</label>
                    <input type="password" id="key-gpt" style="width:100%; background:#000; border:1px solid #222; color:var(--neon); padding:10px; margin-top:5px;" placeholder="sk-...">
                </div>
                <button onclick="saveKeys()" style="width:100%; padding:15px; background:var(--gold); border:none; font-weight:bold; cursor:pointer; border-radius:4px;">تفعيل البروتوكول ✅</button>
                <p id="save-hint" style="text-align:center; font-size:0.6rem; color:var(--neon); display:none; margin-top:10px;">تم التشفير والحفظ!</p>
            </div>
        </div>

    </div>

    <div id="sys-log">READY_FOR_OPERATIONS...</div>

    <nav>
        <div class="nav-btn active" onclick="tab('win-core', this)"><span>CORE</span></div>
        <div class="nav-btn" onclick="tab('win-arsenal', this)"><span>ARSENAL</span></div>
        <div class="nav-btn" onclick="tab('win-config', this)"><span>CONFIG</span></div>
    </nav>
</div>

<script>
    /* ============================================================
       TITAN-X KERNEL v80 ENGINE
       ============================================================ */

    let KEYS = { gemini: "", gpt: "" };
    const PROXY = "https://corsproxy.io/?"; // البروكسي لضمان العمل بضمان 100%

    // --- الوظيفة التنفيذية الرئيسية ---
    async function execute() {
        const inp = document.getElementById('cmd-in');
        const engine = document.getElementById('engine').value;
        const val = inp.value.trim();
        if(!val) return;

        addMsg(val, 'usr');
        inp.value = "";
        log(`Connecting via ${engine.toUpperCase()} Tunnel...`);

        if(engine === 'gemini') {
            await callGemini(val);
        } else {
            await callGPT(val);
        }
    }

    // --- محرك Gemini (مع البروكسي) ---
    async function callGemini(txt) {
        if(!KEYS.gemini) { addMsg("خطأ: مفتاح Gemini مفقود.", "sys"); return; }
        
        try {
            const api = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEYS.gemini}`;
            const res = await fetch(PROXY + encodeURIComponent(api), {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: txt }] }] })
            });
            
            if(!res.ok) throw new Error(`HTTP ${res.status}`);
            
            const data = await res.json();
            addMsg(data.candidates[0].content.parts[0].text, 'sys');
        } catch(e) {
            addMsg(`فشل المحرك: ${e.message}. تأكد من المفتاح والإنترنت.`, 'sys');
        }
    }

    // --- محرك ChatGPT (مع البروكسي) ---
    async function callGPT(txt) {
        if(!KEYS.gpt) { addMsg("خطأ: مفتاح GPT مفقود.", "sys"); return; }

        try {
            const api = `https://api.openai.com/v1/chat/completions`;
            const res = await fetch(PROXY + encodeURIComponent(api), {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${KEYS.gpt}`
                },
                body: JSON.stringify({
                    model: "gpt-4-turbo-preview",
                    messages: [{role: "user", content: txt}]
                })
            });
            
            const data = await res.json();
            if(data.error) throw new Error(data.error.message);
            addMsg(data.choices[0].message.content, 'sys');
        } catch(e) {
            addMsg(`فشل محرك GPT: ${e.message}`, 'sys');
        }
    }

    // --- إدارة الواجهة ---
    function addMsg(t, type) {
        const stream = document.getElementById('chat-stream');
        const d = document.createElement('div');
        d.className = `bubble ${type}`;
        d.innerHTML = `<b>[${type === 'sys' ? 'TITAN_X' : 'OPERATOR'}]</b>${t.replace(/\n/g, '<br>')}`;
        stream.appendChild(d);
        stream.parentElement.scrollTop = stream.scrollHeight;
    }

    function tab(id, el) {
        document.querySelectorAll('.win').forEach(w => w.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function cls(id) { document.getElementById(id).classList.remove('active'); }
    function log(m) { document.getElementById('sys-log').innerText = `[LOG] > ${m}`; }

    function saveKeys() {
        KEYS.gemini = document.getElementById('key-gem').value.trim();
        KEYS.gpt = document.getElementById('key-gpt').value.trim();
        localStorage.setItem('titan_v80_keys', JSON.stringify(KEYS));
        document.getElementById('save-hint').style.display = 'block';
        setTimeout(() => document.getElementById('save-hint').style.display = 'none', 2000);
        log("KEYS_INJECTED_SUCCESSFULLY");
    }

    function initArsenal() {
        const tools = ["SQL_INJECTOR", "BRUTE_FORCE", "DORK_SCANNER", "XSS_PAYLOADS", "IP_TRACKER", "B64_ENCODER"];
        const grid = document.getElementById('arsenal-grid');
        tools.forEach(t => {
            const d = document.createElement('div');
            d.className = 'card-tool';
            d.innerHTML = `<div style="font-size:0.6rem; color:var(--gold); margin-bottom:5px;">${t}</div><button style="background:var(--gold); border:none; font-size:0.5rem; border-radius:2px; padding:3px 8px;">LOAD</button>`;
            d.onclick = () => addMsg(`تم تحميل وحدة: ${t}. جاري تجهيز القوالب...`, 'sys');
            grid.appendChild(d);
        });
    }

    window.onload = () => {
        const saved = localStorage.getItem('titan_v80_keys');
        if(saved) {
            KEYS = JSON.parse(saved);
            document.getElementById('key-gem').value = KEYS.gemini;
            document.getElementById('key-gpt').value = KEYS.gpt;
        }
        initArsenal();
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
            document.getElementById('ping').innerText = `LATENCY: ${Math.floor(Math.random()*40+20)}ms`;
        }, 1000);
        log("SYSTEM_V80_READY.");
    };
</script>

</body>
</html>
